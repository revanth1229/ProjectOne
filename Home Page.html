        function searchManhwa(event) {

                "the heavenly demon can't live a normal life": "heavenly demon cant live a normal life.html"
            };

            // Redirect if the search query matches a manhwa title
            if (manhwaPages[searchQuery]) {
                window.location.href = manhwaPages[searchQuery];
            } else {
                alert("No results found.");
            }
        }
